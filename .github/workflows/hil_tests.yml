name: ESP32 HIL Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  hil_test:
    runs-on: self-hosted

    steps:
      - name: Clean workspace
        shell: powershell
        run: |
          Remove-Item -Recurse -Force * -ErrorAction SilentlyContinue

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Force runner to use Python 3.10
        run: |
          echo "$env:RUNNER_TOOL_CACHE\Python\3.10.11\x64" >> $env:GITHUB_PATH

      - name: Verify Python version
        run: python --version

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pyserial

      - name: Install PlatformIO
        run: |
          pip install platformio

      - name: Build HIL test firmware
        run: |
          py -3.10 -m platformio run -e hil_test

      - name: Flash HIL test firmware
        run: |
          pio run -e hil_test -t upload

      - name: Start Mosquitto MQTT broker
        shell: powershell
        run: |
          Start-Process -FilePath "C:\Program Files\mosquitto\mosquitto.exe" `
            -ArgumentList '-c "C:\Program Files\mosquitto\mosquitto_local.conf" -v'

      - name: Wait for ESP32 reboot
        shell: powershell
        run: |
          Start-Sleep -Seconds 30
      - name: Run HIL tests
        run: |
          pytest -v

      - name: Run HIL tests
        run: |
          pytest -v
