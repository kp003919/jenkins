name: ESP32 HIL Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  hil_test:
    runs-on: self-hosted

    steps:
      - name: Clean workspace safely
        shell: powershell
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          Get-ChildItem -Force | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Verify Python version
        run: python --version

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pyserial junit-xml

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build HIL test firmware
        run: platformio run -e hil_test

      - name: Flash HIL test firmware
        run: platformio run -e hil_test -t upload

      - name: Start Mosquitto MQTT broker
        shell: powershell
        run: |
          Start-Process -FilePath "C:\Program Files\mosquitto\mosquitto.exe" `
            -ArgumentList '-c "C:\Program Files\mosquitto\mosquitto_local.conf" -v'
          Start-Sleep -Seconds 3

      - name: Wait for ESP32 reboot
        shell: powershell
        run: Start-Sleep -Seconds 25

      - name: Run HIL tests and generate report
        run: |
          pytest -v --junitxml=hil_report.xml

      - name: Upload HIL Test Report
        uses: actions/upload-artifact@v4
        with:
          name: hil-test-report
          path: hil_report.xml

      - name: Add summary to GitHub Actions UI
        shell: bash
        run: |
          echo "## ESP32 HIL Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Firmware:** hil_test" >> $GITHUB_STEP_SUMMARY
          echo "**Report:** hil_report.xml (attached as artifact)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All tests executed. Download the artifact for full details." >> $GITHUB_STEP_SUMMARY
