variables:
  GIT_STRATEGY: clone

stages:
  - test

test_job:
  stage: test
  image: python:3.11

  before_script:
    - pip install -r requirements.txt

  script:
    - echo "=== CI DIRECTORY STRUCTURE ==="
    - ls -R .
    # Generate JUnit XML report for GitLab Test Reports
    - pytest -m "not hil" -v --junitxml=report.xml

  artifacts:
    # GitLab will parse this and show a Test Report tab
    reports:
      junit: report.xml

    # Optional: keep the raw report for download
    paths:
      - report.xml

    expire_in: 1 week
